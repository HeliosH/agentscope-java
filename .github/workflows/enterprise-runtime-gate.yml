name: Enterprise Runtime Gate

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL of the running SaaS app configured with SAAS_SANDBOX_TYPE=opensandbox"
        required: true
        default: "http://localhost:18080"
      opensandbox_api_base_url:
        description: "Optional OpenSandbox API base URL for direct provider lifecycle validation"
        required: false
        default: ""
      opensandbox_image:
        description: "OpenSandbox image for direct provider lifecycle validation"
        required: false
        default: "ubuntu:latest"

jobs:
  runtime-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Validate OpenSandbox application runtime
        shell: bash
        env:
          BASE: ${{ inputs.base_url }}
          SANDBOX_SMOKE_TIMEOUT: "240"
          SANDBOX_SMOKE_BACKEND_RELEASE_TIMEOUT: "90"
          SANDBOX_SMOKE_ADMIN_EMAIL: ${{ vars.SANDBOX_SMOKE_ADMIN_EMAIL }}
          SANDBOX_SMOKE_ADMIN_PASSWORD: ${{ secrets.SANDBOX_SMOKE_ADMIN_PASSWORD }}
        run: |
          chmod +x agentscope-saas/agentscope-saas-app/scripts/opensandbox-enterprise-smoke.sh
          agentscope-saas/agentscope-saas-app/scripts/opensandbox-enterprise-smoke.sh

      - name: Validate OpenSandbox provider lifecycle
        if: inputs.opensandbox_api_base_url != ''
        shell: bash
        env:
          OPENSANDBOX_API_BASE_URL: ${{ inputs.opensandbox_api_base_url }}
          OPENSANDBOX_IMAGE: ${{ inputs.opensandbox_image }}
          OPENSANDBOX_API_KEY: ${{ secrets.OPENSANDBOX_API_KEY }}
        run: |
          chmod +x agentscope-saas/agentscope-saas-app/scripts/opensandbox-runtime-lifecycle.sh
          agentscope-saas/agentscope-saas-app/scripts/opensandbox-runtime-lifecycle.sh
