# ===================================================================
# AgentScope Enterprise SaaS Platform — default (production) profile
# Connects PostgreSQL + Valkey/Redis + an internal model gateway.
# Override any value via environment variables (shown in ${...:default}).
# ===================================================================
server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: agentscope-saas
  # --- PostgreSQL ---
  # Primary pool connects as the non-superuser `app` role so Row-Level Security (V6/V9) is enforced.
  # The `app` role is created by db/provisioning/postgres-app-role.sql (run before first boot).
  datasource:
    url: ${SAAS_DB_URL:jdbc:postgresql://localhost:5432/agentscope_saas}
    username: ${SAAS_DB_USER:app}
    password: ${SAAS_DB_PASSWORD:agentscope}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  # --- Flyway (PostgreSQL migrations) ---
  # Flyway uses the @FlywayDataSource-qualified admin DataSource (AdminDataSourceConfig), which
  # connects as the superuser `agentscope` — required because V6/V8/V9 ENABLE ROW LEVEL SECURITY
  # and CREATE/DROP POLICY need the table owner, and V10 ALTER DEFAULT PRIVILEGES needs the
  # agentscope role. FORCE ROW LEVEL SECURITY applies to the owner, so tenant-data migrations after
  # V6 must run as a superuser/BYPASSRLS role.
  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql
    baseline-on-migrate: true

# --- SaaS platform runtime ---
saas:
  # Admin/bypass DataSource: connects as the superuser `agentscope` and does NOT set the RLS GUC, so
  # it bypasses Row-Level Security. Used ONLY for bootstrap queries that run before a tenant context
  # exists (AuthController login/register) — see AdminDataSourceConfig + AuthBootstrapRepository.
  datasource:
    admin:
      url: ${SAAS_DB_ADMIN_URL:jdbc:postgresql://localhost:5432/agentscope_saas}
      username: ${SAAS_DB_ADMIN_USER:agentscope}
      password: ${SAAS_DB_ADMIN_PASSWORD:agentscope}
      driver-class-name: org.postgresql.Driver
  model:
    # stub | gateway | dashscope. Production should use the internal gateway.
    type: ${SAAS_MODEL_TYPE:gateway}
    base-url: ${SAAS_MODEL_BASE_URL:}
    api-key: ${SAAS_MODEL_API_KEY:}
    name: ${SAAS_MODEL_NAME:qwen-max}
  redis:
    enabled: ${SAAS_REDIS_ENABLED:true}
    uri: ${SAAS_REDIS_URI:redis://localhost:6379}
    key-prefix: ${SAAS_REDIS_PREFIX:agentscope:saas:}
  file-store:
    enabled: ${SAAS_FILE_STORE_ENABLED:true}
    # pg = local/dev BYTEA fallback; minio = production object storage.
    backend: ${SAAS_FILE_STORE_BACKEND:pg}
    table: ${SAAS_FILE_STORE_TABLE:file_object_blobs}
    object-key-prefix: ${SAAS_FILE_STORE_KEY_PREFIX:files/}
    minio:
      endpoint: ${SAAS_FILE_STORE_MINIO_ENDPOINT:${SAAS_SANDBOX_MINIO_ENDPOINT:http://localhost:9000}}
      access-key: ${SAAS_FILE_STORE_MINIO_ACCESS_KEY:${SAAS_SANDBOX_MINIO_ACCESS_KEY:minioadmin}}
      secret-key: ${SAAS_FILE_STORE_MINIO_SECRET_KEY:${SAAS_SANDBOX_MINIO_SECRET_KEY:minioadmin}}
      bucket: ${SAAS_FILE_STORE_MINIO_BUCKET:${SAAS_SANDBOX_MINIO_BUCKET:agentscope-saas}}
      region: ${SAAS_FILE_STORE_MINIO_REGION:${SAAS_SANDBOX_MINIO_REGION:}}
  sandbox:
    enabled: ${SAAS_SANDBOX_ENABLED:false}
    type: ${SAAS_SANDBOX_TYPE:cube}
    image: ${SAAS_SANDBOX_IMAGE:ubuntu:22.04}
    workspace-root: ${SAAS_SANDBOX_WORKSPACE_ROOT:}
    isolation-scope: ${SAAS_SANDBOX_ISOLATION_SCOPE:USER}
    memory-limit-bytes: ${SAAS_SANDBOX_MEMORY_BYTES:}
    cpu-count: ${SAAS_SANDBOX_CPU_COUNT:}
    idle-ttl-seconds: ${SAAS_SANDBOX_IDLE_TTL:600}
    execution-guard-max-wait-seconds: ${SAAS_SANDBOX_GUARD_MAX_WAIT_SECONDS:60}
    execution-guard-lease-ttl-seconds: ${SAAS_SANDBOX_GUARD_LEASE_TTL_SECONDS:1800}
    execution-guard-retry-interval-millis: ${SAAS_SANDBOX_GUARD_RETRY_INTERVAL_MS:500}
    reconciliation-enabled: ${SAAS_SANDBOX_RECONCILIATION_ENABLED:true}
    reconciliation-fixed-delay-seconds: ${SAAS_SANDBOX_RECONCILIATION_FIXED_DELAY_SECONDS:${SAAS_SANDBOX_RECONCILIATION_FIXED_DELAY:300}}
    reconciliation-batch-size: ${SAAS_SANDBOX_RECONCILIATION_BATCH_SIZE:100}
    reconciliation-active-grace-seconds: ${SAAS_SANDBOX_RECONCILIATION_ACTIVE_GRACE_SECONDS:120}
    backend-release-max-attempts: ${SAAS_SANDBOX_BACKEND_RELEASE_MAX_ATTEMPTS:5}
    cube-api-url: ${SAAS_SANDBOX_CUBE_API_URL:${CUBE_API_URL:http://localhost:8080}}
    cube-api-key: ${SAAS_SANDBOX_CUBE_API_KEY:${CUBE_API_KEY:}}
    cube-template-id: ${SAAS_SANDBOX_CUBE_TEMPLATE_ID:${CUBE_TEMPLATE_ID:}}
    cube-domain: ${SAAS_SANDBOX_CUBE_DOMAIN:${CUBE_DOMAIN:}}
    cube-envd-host-pattern: ${SAAS_SANDBOX_CUBE_ENVD_HOST_PATTERN:${CUBE_ENVD_HOST_PATTERN:}}
    cube-insecure-skip-tls-verify: ${SAAS_SANDBOX_CUBE_INSECURE_SKIP_TLS_VERIFY:${CUBE_INSECURE_SKIP_TLS_VERIFY:false}}
    cube-sandbox-timeout-seconds: ${SAAS_SANDBOX_CUBE_TIMEOUT:${CUBE_SANDBOX_TIMEOUT:300}}
    # --- E2B (official hosted sandbox, https://e2b.app). Used when type=e2b. ---
    # API key is required for type=e2b. Get one at https://e2b.app.
    e2b-api-key: ${SAAS_SANDBOX_E2B_API_KEY:}
    # Override only for a private E2B-compatible deployment; defaults to https://api.e2b.dev.
    e2b-api-base-url: ${SAAS_SANDBOX_E2B_API_BASE_URL:}
    e2b-template-id: ${SAAS_SANDBOX_E2B_TEMPLATE_ID:}
    # Sandbox domain (defaults to e2b.app). Override for private deployments.
    e2b-domain: ${SAAS_SANDBOX_E2B_DOMAIN:}
    e2b-sandbox-timeout-seconds: ${SAAS_SANDBOX_E2B_TIMEOUT:300}
    # --- OpenSandbox (Alibaba OpenSandbox lifecycle API + execd). Used when type=opensandbox. ---
    open-sandbox-api-base-url: ${SAAS_SANDBOX_OPENSANDBOX_API_BASE_URL:http://localhost:8080}
    open-sandbox-api-key: ${SAAS_SANDBOX_OPENSANDBOX_API_KEY:}
    open-sandbox-execd-access-token: ${SAAS_SANDBOX_OPENSANDBOX_EXECD_ACCESS_TOKEN:}
    open-sandbox-image: ${SAAS_SANDBOX_OPENSANDBOX_IMAGE:}
    open-sandbox-cpu-limit: ${SAAS_SANDBOX_OPENSANDBOX_CPU_LIMIT:1}
    open-sandbox-memory-limit: ${SAAS_SANDBOX_OPENSANDBOX_MEMORY_LIMIT:1Gi}
    open-sandbox-sandbox-timeout-seconds: ${SAAS_SANDBOX_OPENSANDBOX_TIMEOUT:300}
    open-sandbox-wait-timeout-seconds: ${SAAS_SANDBOX_OPENSANDBOX_WAIT_TIMEOUT:120}
    open-sandbox-execd-port: ${SAAS_SANDBOX_OPENSANDBOX_EXECD_PORT:44772}
    open-sandbox-default-exec-timeout-seconds: ${SAAS_SANDBOX_OPENSANDBOX_DEFAULT_EXEC_TIMEOUT:120}
    open-sandbox-connect-timeout-seconds: ${SAAS_SANDBOX_OPENSANDBOX_CONNECT_TIMEOUT:30}
    open-sandbox-read-timeout-seconds: ${SAAS_SANDBOX_OPENSANDBOX_READ_TIMEOUT:300}
    open-sandbox-max-retries: ${SAAS_SANDBOX_OPENSANDBOX_MAX_RETRIES:3}
    snapshot:
      enabled: ${SAAS_SANDBOX_SNAPSHOT_ENABLED:true}
      # pg = Postgres BYTEA (dev/H2 fallback, zero infra); minio = S3 object storage (production).
      backend: ${SAAS_SANDBOX_SNAPSHOT_BACKEND:pg}
      table: ${SAAS_SANDBOX_SNAPSHOT_TABLE:agentscope_sandbox_snapshots}
    # --- MinIO/S3 snapshot backend (used when snapshot.backend=minio). ---
    minio:
      endpoint: ${SAAS_SANDBOX_MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${SAAS_SANDBOX_MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${SAAS_SANDBOX_MINIO_SECRET_KEY:minioadmin}
      bucket: ${SAAS_SANDBOX_MINIO_BUCKET:agentscope-saas}
      key-prefix: ${SAAS_SANDBOX_MINIO_KEY_PREFIX:snapshots/}
      region: ${SAAS_SANDBOX_MINIO_REGION:}
  rate-limit:
    max-requests: ${SAAS_RATELIMIT_MAX:60}
    window-seconds: ${SAAS_RATELIMIT_WINDOW:60}
  agent:
    name: ${SAAS_AGENT_NAME:assistant}
    max-iters: ${SAAS_AGENT_MAX_ITERS:10}
  ltm:
    # Long-term memory (Mem0). Disabled by default — the platform runs with zero external deps,
    # falling back to MEMORY.md + snapshot persistence. Enable with a reachable Mem0 endpoint to
    # add cross-session semantic recall.
    enabled: ${SAAS_LTM_ENABLED:false}
    mem0-base-url: ${SAAS_LTM_MEM0_BASE_URL:}
    mem0-api-key: ${SAAS_LTM_MEM0_API_KEY:}
    mem0-api-type: ${SAAS_LTM_MEM0_API_TYPE:PLATFORM}
    timeout-seconds: ${SAAS_LTM_TIMEOUT:60}
    top-k: ${SAAS_LTM_TOP_K:5}
    replay-enabled: ${SAAS_LTM_REPLAY_ENABLED:true}
    replay-fixed-delay-seconds: ${SAAS_LTM_REPLAY_FIXED_DELAY:60}
    replay-batch-size: ${SAAS_LTM_REPLAY_BATCH_SIZE:50}
    replay-max-attempts: ${SAAS_LTM_REPLAY_MAX_ATTEMPTS:10}
    replay-stale-seconds: ${SAAS_LTM_REPLAY_STALE_SECONDS:300}
  degradation:
    enabled: ${SAAS_DEGRADATION_ENABLED:true}
    # warn = expose/metric only; block = fail closed for new chat runs when critical deps degrade.
    chat-policy: ${SAAS_DEGRADATION_CHAT_POLICY:warn}
    health-cache-ttl-seconds: ${SAAS_DEGRADATION_HEALTH_CACHE_TTL_SECONDS:15}
    # Optional, for deployments exposing an OpenSandbox health endpoint (for example /health).
    open-sandbox-health-path: ${SAAS_DEGRADATION_OPENSANDBOX_HEALTH_PATH:}
  security:
    jwt:
      secret: ${SAAS_JWT_SECRET:change-me-saas-dev-secret-please-override-in-prod-0123456789}
      ttl-seconds: ${SAAS_JWT_TTL:43200}
      issuer: ${SAAS_JWT_ISSUER:agentscope-saas}
      # Set issuer-uri or jwk-set-uri to validate tokens from an enterprise IdP (SSO).
      issuer-uri: ${SAAS_OIDC_ISSUER_URI:}
      jwk-set-uri: ${SAAS_OIDC_JWK_SET_URI:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    io.agentscope: ${SAAS_LOG_LEVEL:INFO}
    org.springframework.security: WARN
